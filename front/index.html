<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <title>Employees</title>
</head>
<body>

<h2>Создать сотрудника</h2>

<form id="create-form" data-action="create">
<input name="name" placeholder="Имя"><br>
<input name="sex" placeholder="Пол"><br>
<input name="age" placeholder="Возраст"><br>
<input name="salary" placeholder="Зарплата"><br>

<button type="submit">Создать</button>
</form>

<hr>

<h2>Обновить сотрудника</h2>

<form id="update-form" data-action="update">
<input name="id" placeholder="ID"><br>
<input name="name" placeholder="Имя"><br>
<input name="sex" placeholder="Пол"><br>
<input name="age" placeholder="Возраст"><br>
<input name="salary" placeholder="Зарплата"><br>

<button type="submit">Обновить</button>
</form>

<hr>

<h2>Найти сотрудника</h2>

<input id="getId" placeholder="ID">
<button onclick="getEmployee()">Получить</button>

<hr>

<h2>Результат</h2>
<pre id="result"></pre>

<script src="js/helpers.js"></script>
<script src="js/main.js"></script>
</body>
</html>
